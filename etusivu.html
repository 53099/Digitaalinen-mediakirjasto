<!DOCTYPE html>
<html lang="fi">

<head>

    <meta charset="UTF-8">

    <title>Etusivu</title>

    <link rel="stylesheet" href="etusivu.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<script src="script.js"></script>

<body>

    <div class="sidebar">

        <div class="back-button">
            ←
        </div>

        <h3>Kategoriat</h3>


        <ul>
            <li>Romantiikka</li>
            <li>Tumma Romantiikka</li>
            <li>Kauhu</li>
            <li>Tosi Rikollisuus</li>
            <li>Rikollisuus</li>
            <li>Fantasia</li>
            <li>Sci-Fi</li>
            <li>Mysteerit</li>
            <li>LGBTQ+</li>

        </ul>

        <h3 class="section-title">
            Omat katselulistat
        </h3>


        <ul>

            <li>Katsottu</li>
            <li>Kesken</li>
            <li>Pitää katsoa</li>

        </ul>

        <div class="bottom-links">

            <button onclick="logout()">
            <p>Kirjaudu ulos</p>
            </button>
            <p>Asetukset</p>
            <p>Käyttäjätili</p>
        </div>

    </div>

    <div class="main-content">

        <div class="topbar">

            <input type="text" placeholder="Hae aineistoa...">
        </div>

        <div class="tabs">

            <button class="tab">
                Elokuvat
            </button>

            <button class="tab">
                Sarjat
            </button>

            <button class="tab">
                Kirjat
            </button>

            <button class="tab">
                Pelit
            </button>

        </div>

        <div class="content-box">

            <h1>Ei vielä lisättyä mediaa</h1>

        </div>

    </div>

</body>

</html>

<script src="etusivu.js"></script>
