<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">

    <title>Mediakirjasto</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">

        <h1>Login</h1>

        <label>Sähköposti</label>

        <input
            type="email"
            id="email"
            placeholder="Syötä sähköposti">

        <label>Salasana</label>

        <input
            type="password"
            id="password"
            placeholder="Syötä salasana">

            <button onclick="login()">
                Kirjaudu sisään
            </button>

            <button onclick="window.location.href='Rekisteri.html'">
                Rekisteröidy
            </button>

        <p id="message"></p>

    </div>

    <script src="script.js"></script>

</body>

</html>
