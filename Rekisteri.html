<!DOCTYPE html>
<html lang="fi">

<head>

    <meta charset="UTF-8">

    <title>Rekisteröidy</title>

    <link rel="stylesheet"
    href="style.css">

</head>

<body>

    <div class="container">

        <h1>Rekisteröidy</h1>

        <label>Sähköposti</label>

        <input
            type="email"
            id="email"
            placeholder="Anna sähköposti">

        <label>Salasana</label>

        <input
            type="password"
            id="password"
            placeholder="Anna salasana">

        <button onclick="register()">
            Luo tili
        </button>

        <p id="message"></p>

    </div>

    <script src="script.js"></script>

</body>

</html>
